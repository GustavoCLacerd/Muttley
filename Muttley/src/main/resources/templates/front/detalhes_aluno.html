<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Aluno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/front/muttley-front.css">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap justify-content-between gap-2">
            <h1 class="h3 m-0">Detalhes do Aluno</h1>
            <a class="btn btn-outline-secondary" href="/">Voltar ao menu</a>
        </div>
    </section>

    <!-- Aluno encontrado: exibe os dados em modo leitura + acoes -->
    <section th:if="${aluno != null}" class="card shadow-sm">
        <div class="card-body">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <div class="form-control" th:text="${aluno.nome}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">CPF</label>
                <div class="form-control" th:text="${aluno.cpf}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Curso</label>
                <div class="form-control" th:text="${aluno.curso}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <div class="form-control" th:text="${aluno.email}"></div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Saldo Hard Skill</label>
                    <div class="form-control" th:text="${aluno.saldoHardSkill}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Saldo Soft Skill</label>
                    <div class="form-control" th:text="${aluno.saldoSoftSkill}"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Saldo Total</label>
                    <div class="form-control" th:text="${aluno.saldoTotal}"></div>
                </div>
            </div>

            <div class="d-flex gap-2 align-items-center">
                <a class="btn btn-outline-secondary" href="/">Voltar</a>

                <a class="btn btn-warning ms-auto"
                   th:href="@{'/alunos/editar/' + ${aluno.id}}">Editar</a>

                <form th:action="@{'/alunos/excluir/' + ${aluno.id}}" method="post" class="m-0">
                    <button class="btn btn-danger" type="submit"
                            onclick="return confirm('Tem certeza que deseja excluir este aluno?')">
                        Excluir
                    </button>
                </form>
            </div>

        </div>
    </section>

    <!-- Aluno nao encontrado: exibe mensagem -->
    <section th:if="${mensagem != null}" class="card shadow-sm">
        <div class="card-body">
            <div class="alert alert-warning mb-3" role="alert">
                <span th:text="${mensagem}"></span>
            </div>
            <a class="btn btn-outline-secondary" href="/">Voltar</a>
        </div>
    </section>
</main>
</body>
</html>
