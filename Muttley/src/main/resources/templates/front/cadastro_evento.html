<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Evento</title>
    <link rel="stylesheet" href="/muttley/src/main/resources/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/muttley/src/main/resources/static/css/front/muttley-front.css">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap justify-content-between gap-2">
            <h1 class="h3 m-0">Novo Evento</h1>
            <a class="btn btn-outline-secondary" href="index.html">Voltar ao menu</a>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/eventos/salvar}" th:object="${evento}" method="post">

                <div class="mb-3">
                    <label for="tipoEvento" class="form-label fw-semibold">Selecione o tipo de evento</label>
                    <select id="tipoEvento" th:field="*{tipoEvento}" class="form-select" required>
                        <option value="">-- Selecione --</option>
                        <option value="TREINAMENTO">Treinamento</option>
                        <option value="PALESTRA">Palestra</option>
                        <option value="FATEC_PORTAS_ABERTAS_1">Fatec Portas Abertas - Fase 1</option>
                        <option value="FATEC_PORTAS_ABERTAS_2">Fatec Portas Abertas - Fase 2</option>
                        <option value="FATEC_PORTAS_ABERTAS_3">Fatec Portas Abertas - Fase 3</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="descricao" class="form-label">Descrição</label>
                    <input id="descricao" th:field="*{descricao}" class="form-control" placeholder="Ex: Palestra Currículo">
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" type="button">Editar</button>
                    <button class="btn btn-outline-danger" type="button">Excluir</button>
                    <button class="btn btn-primary ms-auto" type="submit">Salvar</button>
                </div>

            </form>
        </div>
    </section>
</main>
</body>
</html>
