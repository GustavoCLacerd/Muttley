<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/front/muttley-front.css">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap justify-content-between gap-2">
            <h1 class="h3 m-0">Cadastro de Aluno</h1>
            <a class="btn btn-outline-secondary" href="/">Voltar ao menu</a>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">

                <!-- Campo oculto essencial para edicao (carrega o id do aluno) -->
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="nome" class="form-label fw-semibold">Nome</label>
                    <input id="nome" th:field="*{nome}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label fw-semibold">CPF</label>
                    <input id="cpf" th:field="*{cpf}" class="form-control" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" required>
                </div>

                <div class="mb-3">
                    <label for="curso" class="form-label fw-semibold">Curso</label>
                    <input id="curso" th:field="*{curso}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <input id="email" th:field="*{email}" class="form-control" type="email">
                </div>

                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary" href="/">Voltar</a>
                    <button class="btn btn-primary ms-auto" type="submit">Salvar</button>
                </div>

            </form>
        </div>
    </section>
</main>
<script>
    const cpfInput = document.getElementById("cpf");

    const aplicarMascaraCpf = (valor) => {
        const numeros = valor.replace(/\D/g, "").slice(0, 11);
        return numeros
            .replace(/^(\d{3})(\d)/, "$1.$2")
            .replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
            .replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
    };

    if (cpfInput) {
        const aplicarNoCampoCpf = () => {
            cpfInput.value = aplicarMascaraCpf(cpfInput.value);
        };

        aplicarNoCampoCpf();
        cpfInput.addEventListener("input", aplicarNoCampoCpf);
    }
</script>
</body>
</html>
