<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Muttley</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/front/muttley-front.css">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="h3 m-0">Menu Muttley</h1>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <form action="/alunos/buscar" method="get">

                <div class="mb-3">
                    <label for="nomeBusca" class="form-label fw-semibold">Nome</label>
                    <input id="nomeBusca" class="form-control" placeholder="Digite o nome">
                </div>

                <div class="mb-4">
                    <label for="cpfBusca" class="form-label fw-semibold">CPF</label>
                    <input id="cpfBusca" name="cpf" class="form-control" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" required>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-secondary" type="button">Importar Lista</button>
                    <a class="btn btn-outline-secondary" href="/alunos/novo">Novo Cadastro</a>
                    <a class="btn btn-outline-secondary" href="/eventos/novo">Novo Evento</a>
                    <button class="btn btn-primary ms-auto" type="submit">Buscar</button>
                </div>

            </form>
        </div>
    </section>
</main>
<script>
    const cpfBuscaInput = document.getElementById("cpfBusca");

    const aplicarMascaraCpf = (valor) => {
        const numeros = valor.replace(/\D/g, "").slice(0, 11);
        return numeros
            .replace(/^(\d{3})(\d)/, "$1.$2")
            .replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
            .replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
    };

    if (cpfBuscaInput) {
        cpfBuscaInput.addEventListener("input", (event) => {
            event.target.value = aplicarMascaraCpf(event.target.value);
        });
    }
</script>
</body>
</html>
