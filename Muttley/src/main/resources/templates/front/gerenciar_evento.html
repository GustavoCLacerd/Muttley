<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/front/muttley-front.css">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap justify-content-between gap-2">
            <h1 class="h3 m-0">Gerenciar Eventos</h1>
            <a class="btn btn-outline-secondary" href="index.html">Voltar ao menu</a>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Tipo de Evento</th>
                        <th>Descrição</th>
                        <th class="text-end pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="evento, stat : ${eventos}">
                        <td class="ps-3 text-muted" th:text="${stat.count}">1</td>
                        <td th:text="${evento.tipoEvento}">Fatec Portas Abertas - Fase 1</td>
                        <td th:text="${evento.descricao}">legal</td>
                        <td class="text-end pe-3">
                            <a href="editar_evento.html?id=${evento.id}"
                               class="btn btn-primary btn-sm me-1"
                               style="width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;"
                               title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/eventos/excluir/{id}(id=${evento.id})}"
                               class="btn btn-danger btn-sm"
                               style="width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;"
                               title="Excluir"
                               onclick="return confirm('Deseja excluir este evento?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(eventos)}">
                        <td colspan="4" class="text-center text-muted py-4">Nenhum evento cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
